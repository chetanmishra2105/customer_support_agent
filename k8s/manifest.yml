apiVersion: v1
kind: Namespace
metadata:
  name: customer-support
---
apiVersion: v1
kind: Secret
metadata:
  name: customer-support-secrets
  namespace: customer-support
stringData:
  GROQ_API_KEY: "REPLACE_WITH_YOUR_GROQ_API_KEY"
  LANGCHAIN_API_KEY: "REPLACE_WITH_YOUR_LANGCHAIN_API_KEY"
  SECRET_KEY: "REPLACE_WITH_YOUR_SECRET_KEY"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-support-config
  namespace: customer-support
data:
  MODEL_NAME: "llama-3.3-70b-versatile"
  EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  CHROMA_PERSIST_DIR: "./data/chromadb"
  CHROMA_COLLECTION_NAME: "customer_support_kb"
  CHROMA_HOST: "chromadb"
  CHROMA_PORT: "8000"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  BACKEND_PORT: "8000"
  FRONTEND_PORT: "8501"
  TICKET_SYSTEM_ENABLED: "true"
  ESCALATION_EMAIL: "support@example.com"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: customer-support
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromadb-data-pvc
  namespace: customer-support
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: customer-support
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: customer-support
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: customer-support
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: "/chroma/chroma"
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: chromadb-data
              mountPath: /chroma/chroma
      volumes:
        - name: chromadb-data
          persistentVolumeClaim:
            claimName: chromadb-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: customer-support
spec:
  selector:
    app: chromadb
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: customer-support
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 5114540/customer_agent_repo:backend-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: customer-support-config
            - secretRef:
                name: customer-support-secrets
          volumeMounts:
            - name: backend-data
              mountPath: /app/data
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: chromadb-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: customer-support
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: customer-support
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 5114540/customer_agent_repo:frontend-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            - name: BACKEND_URL
              value: "http://backend:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: customer-support
spec:
  selector:
    app: frontend
  ports:
    - port: 8501
      targetPort: 8501
  type: ClusterIP
