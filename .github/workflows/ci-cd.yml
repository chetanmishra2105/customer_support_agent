name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python syntax
        run: |
          python -m compileall backend frontend

      - name: Run unit tests if present
        run: |
          if [ -d test ] && [ "$(ls -A test)" ]; then
            python -m pytest test
          else
            echo "No tests found under test/; skipping unit tests."
          fi

  build-and-push-docker-images:
    name: Continuous Delivery
    needs: integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend Docker image
        run: |
          docker build --file docker/Dockerfile.backend --tag ${{ secrets.DOCKER_USERNAME }}/customer_agent_repo:backend-latest .

      - name: Build frontend Docker image
        run: |
          docker build --file docker/Dockerfile.frontend --tag ${{ secrets.DOCKER_USERNAME }}/customer_agent_repo:frontend-latest .

      - name: Push backend Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/customer_agent_repo:backend-latest

      - name: Push frontend Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/customer_agent_repo:frontend-latest

  continuous-deployment:
    name: Continuous Deployment
    needs: build-and-push-docker-images
    runs-on: ubuntu-latest

    steps:
      - name: Notify deployment hold
        run: |
          echo "Deployment is on hold because no cloud access is available."
          echo "Continuous Deployment section is intentionally disabled."
          exit 0
